name: Build Plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build JetBrains Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile Kotlin
        run: ./gradlew compileKotlin

      - name: Run tests
        run: ./gradlew test

      - name: Verify plugin configuration
        run: ./gradlew verifyPluginConfiguration

      - name: Build plugin package
        run: ./gradlew buildPlugin

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="$(grep '^pluginVersion' gradle.properties | sed -E 's/.*=[[:space:]]*//')"
          expected_tag="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pluginVersion ${version}. Use ${expected_tag} or update gradle.properties."
            exit 1
          fi
          echo "PLUGIN_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "PLUGIN_ZIP=FileDescription-${version}.zip" >> "${GITHUB_ENV}"

      - name: Generate plugin repository metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cat > updatePlugins.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <plugin id="com.whispersong.jetbrains.file_description_plugin_v2" url="https://github.com/whisper3zzz/File-Description-Jetbrains-Plugin/releases/download/v${PLUGIN_VERSION}/FileDescription-${PLUGIN_VERSION}.zip" version="${PLUGIN_VERSION}">
              <name>File Description</name>
              <description>
              <![CDATA[
                Automatically add and update file header comments.
                <br>
                See <a href="https://github.com/whisper3zzz/File-Description-Jetbrains-Plugin/releases/tag/v${PLUGIN_VERSION}">release notes</a>.
              ]]>
              </description>
            </plugin>
          </plugins>
          EOF

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-description-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "build/distributions/${PLUGIN_ZIP}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "build/distributions/${PLUGIN_ZIP}" --generate-notes
          fi

      - name: Update custom plugin repository
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cp updatePlugins.xml /tmp/updatePlugins.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/updatePlugins.xml updatePlugins.xml
          git add updatePlugins.xml
          if git diff --cached --quiet; then
            echo "updatePlugins.xml is already up to date."
          else
            git commit -m "Update plugin repository metadata for v${PLUGIN_VERSION}"
            git push origin HEAD:main
          fi
